name: 临时生成依赖元数据

on:
  pull_request:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.0.3
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.0.0
        with:
          cache-provider: basic
      - name: 使用固定 Kotlinter 格式化源码
        run: ./gradlew --no-daemon --stacktrace --warning-mode=fail --write-locks --write-verification-metadata sha256 formatKotlin
      - name: 由实际解析生成锁与校验元数据
        run: ./gradlew --no-daemon --stacktrace --warning-mode=fail --write-locks --write-verification-metadata sha256 clean check
      - name: 上传待审查元数据
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dependency-metadata
          if-no-files-found: error
          path: |
            **/gradle.lockfile
            gradle/verification-metadata.xml
            asr-core/src/**/*.kt

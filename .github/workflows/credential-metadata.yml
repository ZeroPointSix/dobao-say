name: ZER-122 临时格式与锁文件生成

on:
  pull_request:
    paths:
      - "credential-core/**"
      - ".github/workflows/credential-metadata.yml"

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: basic
      - name: 格式化并生成依赖锁
        run: ./gradlew --no-daemon --stacktrace --warning-mode=fail :credential-core:formatKotlin
      - name: 验证生成后的完整构建
        run: ./gradlew --no-daemon --stacktrace --warning-mode=fail --write-locks clean check
      - name: 上传仅用于审查的生成结果
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zer-122-generated
          path: |
            credential-core
            docs/credential-vault-boundary.md
          if-no-files-found: error
          retention-days: 1
